<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Filmes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=21">
</head>
<body>

    <header>
        <div class="logo">HK<span>Filmes</span></div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#filmes">Filmes</a></li>
                <li><a href="#series">Séries</a></li>
                <li><a href="#animes">Animes</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
        <button id="themeToggle">☀️ Light</button>
    </header>

    <main id="home">
        
        <section class="hero-section">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Pesquisar título...">
                <span class="search-icon">🔍</span>
            </div>
        </section>

        <section id="filmes" class="catalog-section">
            <h2>Filmes</h2>
            <div id="carrossel-filmes" class="grid-catalog">
                </div>
        </section>

        <section id="series" class="catalog-section">
            <h2>Séries</h2>
            <div id="carrossel-series" class="grid-catalog">
                </div>
        </section>

        <section id="animes" class="catalog-section">
            <h2>Animes</h2>
            <div id="carrossel-animes" class="grid-catalog">
                </div>
        </section>

        <section id="contato" class="contact-section">
            <h2>Apoie o Projeto</h2>
            <form id="contactForm">
                <input type="text" placeholder="Seu Nome" required>
                <textarea placeholder="Deixe sua mensagem..." required></textarea>
                <button type="submit" class="btn-primary">Enviar Mensagem</button>
                <p id="contactStatus"></p>
            </form>
        </section>

    </main>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharPlayer()">X FECHAR</span>
            
            <div id="videoContainer" style="width:100%; aspect-ratio:16/9; background:#000;"></div>
            
            <div class="rating-inside">
                <h3>Avalie este título:</h3>
                <div class="stars-wrapper">
                    <input type="radio" name="star" id="star5" value="5"><label for="star5">★</label>
                    <input type="radio" name="star" id="star4" value="4"><label for="star4">★</label>
                    <input type="radio" name="star" id="star3" value="3"><label for="star3">★</label>
                    <input type="radio" name="star" id="star2" value="2"><label for="star2">★</label>
                    <input type="radio" name="star" id="star1" value="1"><label for="star1">★</label>
                </div>
                <div class="stars-numbers">
                    <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
    </script>

    <script src="script.js"></script>
</body>
</html>
