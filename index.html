                    </div>
                    <div class="stars-numbers"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
                </div>
                <p id="ratingMsg"></p>
            </div>
        </div>
    </div>

    <script src="script.js?v=16"></script>

    <script type='module'>
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, push, set } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDCNF3pZ3g20UkNDTUYq-X9zkyKA3El1TM",
          authDomain: "hk-filmes-db.firebaseapp.com",
          databaseURL: "https://hk-filmes-db-default-rtdb.firebaseio.com",
          projectId: "hk-filmes-db",
          storageBucket: "hk-filmes-db.firebasestorage.app",
          messagingSenderId: "688262885548",
          appId: "1:688262885548:web:166f076180373e466af09",
          measurementId: "G-Y6G904E1E1"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        onValue(ref(database, 'views'), (s) => {
            const d = s.val() || {};
            document.querySelectorAll('.view-count').forEach(el => {
                const card = el.closest('.card');
                if(card) {
                    const id = card.getAttribute('onclick').match(/'([^']+)'/)[1];
                    el.innerText = d[id] || 0;
                }
            });
        });

        onValue(ref(database, 'ratings'), (s) => {
            const d = s.val() || {};
            document.querySelectorAll('.star-count').forEach(el => {
                const card = el.closest('.card');
                if(card) {
                    const id = card.getAttribute('onclick').match(/'([^']+)'/)[1];
                    const data = d[id] || { totalPoints: 0, count: 0 };
                    const avg = data.count > 0 ? (data.totalPoints / data.count).toFixed(1) : "0.0";
                    el.innerText = avg;
                }
            });
        });

        window.adicionarViewNoFirebase = (id) => runTransaction(ref(database, 'views/' + id), (v) => (v || 0) + 1);

        document.querySelectorAll('input[name="rating"]').forEach(star => {
            star.addEventListener('change', function() {
                const points = parseInt(this.value);
                const id = window.filmeAbertoID; 
                if(!id) return;
                runTransaction(ref(database, 'ratings/' + id), (current) => {
                    if (!current) current = { totalPoints: 0, count: 0 };
                    current.totalPoints += points; 
                    current.count += 1;
                    return current;
                }).then(() => { 
                    document.getElementById('ratingMsg').innerText = "⭐ Nota " + points + " enviada!";
                    document.querySelectorAll('input[name="rating"]').forEach(s => s.disabled = true); 
                });
            });
        });

        window.enviarMensagem = function() {
            const email = document.getElementById('contactEmail').value;
            const message = document.getElementById('contactMessage').value;
            const status = document.getElementById('contactStatus');

            if(!email || !message) {
                status.innerText = "Por favor, preencha todos os campos.";
                return;
            }

            const novoContatoRef = push(ref(database, 'mensagens'));
            set(novoContatoRef, {
                email: email,
                mensagem: message,
                data: new Date().toISOString()
            }).then(() => {
                status.innerText = "Mensagem enviada com sucesso!";
                document.getElementById('contactForm').reset();
            });
        }
    </script>
</body>
</html>
